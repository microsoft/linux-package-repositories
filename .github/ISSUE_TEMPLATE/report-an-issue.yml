name: Report an issue
description: Help us improve our service by reporting issues you are experiencing.
labels: ["bug"]
body:
  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Acknowledgment
      description: Please confirm the following before submitting.
      options:
        - label: I have read and understood the [Report an issue](https://github.com/microsoft/linux-package-repositories?tab=readme-ov-file#report-an-issue) section of the README.
          required: true
        - label: This issue is a problem with the **packages.microsoft.com infrastructure** (e.g. network errors, HTTP response codes, repository metadata) and **not** an issue with a specific package (e.g. missing dependencies, runtime errors).
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: A clear and concise description of what the issue is.
    validations:
      required: true
  - type: input
    id: when
    attributes:
      label: When did the issue occur?
      description: Be as accurate as you can.
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Package and repo
      description: If applicable, what package did you attempt to install, and from which repo?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior, if applicable.
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context/Screenshots
      description: Add any other context about the problem here.
