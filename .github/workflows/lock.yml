name: 'Lock Threads'

on:
  schedule:
    - cron: '33 2 * * *'
  workflow_dispatch:

jobs:
  action:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          github-token: ${{ github.token }}
          process-only: 'issues'
          issue-inactive-days: '30'
          log-output: true
