name: repoaudit CI

on:
  pull_request:
  push:

permissions: {}

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v3
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1
      - name: Install dependencies
        working-directory: ./repoaudit
        run: poetry install
      - name: Check flake8
        working-directory: ./repoaudit
        run: poetry run flake8 .
      - name: Check black
        working-directory: ./repoaudit
        run: poetry run black --check --diff .
      - name: Check isort
        working-directory: ./repoaudit
        run: poetry run isort -c .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v3
      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1
      - name: Install dependencies
        run: |
          cd repoaudit && poetry install
      - name: Test repoaudit
        run: |
          cd repoaudit && poetry run repoaudit --help
